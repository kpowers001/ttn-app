const fmtDeadline = iso => new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
const fmtExpires = iso => {
  const days = Math.ceil((new Date(iso).getTime() - Date.now()) / 86400000);
  if (days <= 0) return 'Today';
  if (days === 1) return 'Tomorrow';
  if (days < 7) return `${days} days`;
  return 'Next week';
};
const fmtLedgerDate = iso => {
  const days = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  if (days === 0) return 'Today';
  if (days === 1) return 'Yesterday';
  return new Date(iso).toLocaleDateString('en-US',{month:'short',day:'numeric'});
};
const LEDGER_ICONS = { visit:'📍', challenge:'🔥', redemption:'🎁' };

async function fetchLive() {
  const uid = (await db.auth.getUser()).data.user?.id;
  const email = (await db.auth.getUser()).data.user?.email ?? '';
  if (!uid) throw new Error('no session');

  const [profileQ, pointsQ, weeklyQ, allTimeQ, trailsQ, locsQ, visitsQ, chQ, acceptsQ, badgesQ, myBadgesQ, badgeCountsQ, rewardsQ, ledgerQ] = await Promise.all([
    db.from('profiles').select('username,classification,avatar').eq('id', uid).single(),
    db.from('user_points').select('balance').eq('user_id', uid).maybeSingle(),
    db.rpc('get_leaderboard', {p_period:'weekly'}),
    db.rpc('get_leaderboard', {p_period:'alltime'}),
    db.from('trails').select('*').order('sort_order'),
    db.from('locations').select('*').eq('active', true),
    db.from('visits').select('location_id'),
    db.from('challenges_with_state').select('*').order('starts_at'),
    db.from('challenge_accepts').select('challenge_id'),
    db.from('badges').select('*').order('id'),
    db.from('user_badges').select('badge_id').eq('user_id', uid),
    db.from('user_badges').select('user_id'),
    db.from('rewards').select('*').eq('active', true).order('cost_points'),
    db.from('points_ledger').select('*').order('created_at', {ascending:false}).limit(15),
  ]);
  const bad = [profileQ, trailsQ, locsQ, visitsQ, chQ, badgesQ, rewardsQ].find(q => q.error);
  if (bad) throw bad.error;

  const visited = new Set(visitsQ.data.map(v => v.location_id));
  const trails = {};
  for (const t of trailsQ.data) {
    trails[t.id] = { name:t.name, icon:t.icon, color:t.color, locations:[] };
  }
  for (const l of locsQ.data) {
    trails[l.trail_id]?.locations.push({
      id:l.id, name:l.name, desc:l.description, lat:l.lat, lng:l.lng,
      pts:l.points, radiusM:l.radius_m, visited:visited.has(l.id),
    });
  }

  const acceptedIds = new Set((acceptsQ.data ?? []).map(a => a.challenge_id));
  const challenges = chQ.data.map(c => ({
    id:c.id, title:c.title, biz:c.business_name, type:c.trail_id,
    locationId:c.location_id, pts:c.bonus_points, icon:c.icon, badge:c.badge_icon,
    active:c.active, expires:fmtExpires(c.active ? c.ends_at : c.starts_at),
    deadline:fmtDeadline(c.ends_at), participants:null,
    desc:`Visit ${c.business_name} while this challenge is live to earn the bonus.`,
  }));

  const badgeCounts = new Map();
  for (const r of badgeCountsQ.data ?? []) {
    badgeCounts.set(r.user_id, (badgeCounts.get(r.user_id) ?? 0) + 1);
  }
  const lbRow = r => ({
    rank:Number(r.rank), name:r.username, pts:r.points,
    badges:badgeCounts.get(r.user_id) ?? 0, av:r.avatar,
    me:r.user_id === uid, yr:r.classification,
  });

  const earned = new Set((myBadgesQ.data ?? []).map(b => b.badge_id));

  return {
    me: {
      username: profileQ.data.username,
      displayName: profileQ.data.username,
      classification: profileQ.data.classification,
      avatar: profileQ.data.avatar,
      points: pointsQ.data?.balance ?? 0,
      weeklyRank: Number((weeklyQ.data ?? []).find(r => r.user_id === uid)?.rank ?? 0),
      email,
    },
    trails,
    challenges,
    acceptedIds,
    badges: badgesQ.data.map(b => ({icon:b.icon, name:b.name, earned:earned.has(b.id)})),
    rewards: rewardsQ.data.map(r => ({id:r.id, name:r.name, cost:r.cost_points, icon:r.icon, partner:r.partner})),
    history: (ledgerQ.data ?? []).map(l => ({id:String(l.id), act:l.reason, pts:l.delta, date:fmtLedgerDate(l.created_at), icon:LEDGER_ICONS[l.ref_type] ?? '⭐'})),
    lb: {
      weekly: (weeklyQ.data ?? []).map(lbRow).sort((a,b)=>a.rank-b.rank||a.name.localeCompare(b.name)),
      allTime: (allTimeQ.data ?? []).map(lbRow).sort((a,b)=>a.rank-b.rank||a.name.localeCompare(b.name)),
    },
  };
}

function Login({role,onLogin}) {
  const [step,setStep]=useState('login');
  const [form,setForm]=useState({email:'',pw:'',phone:'',year:'',username:''});
  const [error,setError]=useState(null);
  const [busy,setBusy]=useState(false);
  const isStu=role==='student';

  const submit=async()=>{
    setError(null);
    if(!db){ onLogin(); return; }               // no backend configured — demo mode
    if(step==='register'){
      if(isStu&&!form.email.toLowerCase().endsWith('@tuskegee.edu')) return setError('Use your @tuskegee.edu email address');
      if(isStu&&!form.username) return setError('Pick a username');
      if(isStu&&!form.year) return setError('Select your classification');
      if(form.pw.length<8) return setError('Password must be at least 8 characters');
    }
    if(!form.email||!form.pw) return setError('Enter your email and password');
    setBusy(true);
    const {error:err}=step==='login'
      ? await db.auth.signInWithPassword({email:form.email.trim(),password:form.pw})
      : await db.auth.signUp({email:form.email.trim(),password:form.pw,options:{data:{username:form.username.trim(),classification:form.year}}});
    setBusy(false);
    if(err) setError(err.message);
    else onLogin();
  };

  return (
    <div style={{width:'100%',height:'100%',background:S1,overflowY:'auto'}} className="scroll">
      <StatusBar/>
      <div style={{padding:'8px 24px 40px'}}>
        <div style={{marginBottom:24}}>
          <div style={{fontSize:11,color:T3,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>{isStu?'Student Portal':'Business Portal'}</div>
          <div style={{fontSize:28,fontWeight:900,color:T1,letterSpacing:-0.5}}>{step==='login'?'Welcome back':'Create account'}</div>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          {step==='register'&&isStu&&<>
            <Field label="Username" placeholder="@tigerexplorer" val={form.username} onChange={v=>setForm({...form,username:v})}/>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:T3,marginBottom:6,textTransform:'uppercase',letterSpacing:0.8}}>Classification</div>
              <select value={form.year} onChange={e=>setForm({...form,year:e.target.value})}
                style={{width:'100%',padding:'14px 16px',background:BG,border:`1.5px solid ${BD}`,borderRadius:14,fontSize:15,color:form.year?T1:T3,outline:'none',appearance:'none'}}>
                <option value="">Select your year</option>
                {['Freshman','Sophomore','Junior','Senior','Graduate Student'].map(y=><option key={y}>{y}</option>)}
              </select>
            </div>
            <Field label="Phone" placeholder="+1 (334) 000-0000" type="tel" val={form.phone} onChange={v=>setForm({...form,phone:v})}/>
          </>}
          <Field label={isStu?'School Email':'Business Email'} placeholder={isStu?'your.name@tuskegee.edu':'owner@business.com'} type="email" val={form.email} onChange={v=>setForm({...form,email:v})}/>
          <Field label="Password" placeholder="••••••••" type="password" val={form.pw} onChange={v=>setForm({...form,pw:v})}/>
        </div>
        {error&&<div style={{marginTop:14,background:'#FFF0F0',border:`1px solid ${C}30`,color:DC,borderRadius:12,padding:'10px 14px',fontSize:13,fontWeight:600}}>{error}</div>}
        <button onClick={submit} disabled={busy} style={{marginTop:22,width:'100%',padding:'16px',background:busy?'#E0A0A0':C,border:'none',borderRadius:30,color:'#FFF',fontSize:16,fontWeight:800,cursor:busy?'default':'pointer',boxShadow:`0 6px 24px rgba(212,32,32,0.32)`,letterSpacing:0.2}}>
          {busy?'One moment…':step==='login'?'Sign in →':'Create account →'}
        </button>
        <div onClick={()=>setStep(step==='login'?'register':'login')}
          style={{textAlign:'center',marginTop:16,fontSize:14,color:C,cursor:'pointer',fontWeight:600}}>
          {step==='login'?"New to TTN? Create account":"Already have an account? Sign in"}
        </div>
      </div>
    </div>
  );
}

function MapTab() {
  const {trails,refresh}=useData();
  const allLocs = Object.entries(trails).flatMap(([k,t])=>t.locations.map(l=>({...l,trailKey:k,trail:t})));
  const [trail, setTrail] = useState('all');
  const [sel, setSel] = useState(null);
  const [mapReady, setMapReady] = useState(false);
  const [checking, setChecking] = useState(false);
  const mapDivRef = useRef(null);
  const leafletRef = useRef(null);
  const markersRef = useRef([]);

  const checkIn = async loc => {
    if (!db || checking) return;
    setChecking(true);
    // Prototype demo: use the location's own coordinates as the user position.
    // The mobile app sends real GPS; the geofence check is identical.
    const { data, error } = await db.rpc('check_in', { p_location_id: loc.id, p_lat: loc.lat, p_lng: loc.lng });
    setChecking(false);
    if (error) { alert(error.message); return; }
    setSel(null);
    refresh();
    alert(`✅ Checked in at ${loc.name}! +${data.points_awarded} pts`);
  };

  // Init Leaflet once on mount
  useEffect(() => {
    if (!mapDivRef.current || leafletRef.current || !window.L) return;
    const map = window.L.map(mapDivRef.current, {
      zoomControl: false,
      attributionControl: false,
    });
    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      maxZoom: 19,
    }).addTo(map);
    // Fit all 8 confirmed locations
    const bounds = window.L.latLngBounds(allLocs.map(l => [l.lat, l.lng]));
    map.fitBounds(bounds, { padding: [52, 52] });
    leafletRef.current = map;
    setMapReady(true);
    return () => { map.remove(); leafletRef.current = null; };
  }, []);

  // Rebuild markers when trail filter changes or map becomes ready
  useEffect(() => {
    const map = leafletRef.current;
    if (!map) return;
    markersRef.current.forEach(m => map.removeLayer(m));
    markersRef.current = [];
    const locs = trail === 'all' ? allLocs : allLocs.filter(l => l.trailKey === trail);
    locs.forEach(loc => {
      const col = loc.visited ? loc.trail.color : '#888888';
      const markerHtml = `<div style="width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);background:${col};display:flex;align-items:center;justify-content:center;box-shadow:0 3px 14px rgba(0,0,0,0.30);border:2.5px solid white"><span style="transform:rotate(45deg);font-size:15px;line-height:1">${loc.visited ? loc.trail.icon : '🔒'}</span></div>`;
      const icon = window.L.divIcon({ html: markerHtml, className: '', iconSize: [36, 36], iconAnchor: [18, 36] });
      const m = window.L.marker([loc.lat, loc.lng], { icon })
        .addTo(map)
        .on('click', () => setSel(prev => prev?.id === loc.id ? null : loc));
      markersRef.current.push(m);
    });
  }, [trail, mapReady, trails]);

  const vis = allLocs.filter(l => l.visited).length;

  return (
    <div style={{height:'100%',display:'flex',flexDirection:'column'}}>
      <div style={{background:S1,borderBottom:`1px solid ${BD}`,padding:'0 20px 14px'}}>
        <StatusBar/>
        <div style={{fontSize:22,fontWeight:900,color:T1,letterSpacing:-0.3}}>Explore 🗺️</div>
        <div style={{fontSize:13,color:T2,marginTop:2}}>{vis}/{allLocs.length} locations discovered</div>
        <div style={{marginTop:10,height:5,background:BG,borderRadius:3,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${(vis/allLocs.length)*100}%`,background:`linear-gradient(90deg,${C},${G})`,borderRadius:3}}/>
        </div>
      </div>

      <div style={{display:'flex',gap:8,padding:'10px 14px',overflowX:'auto',background:S1,borderBottom:`1px solid ${BD}`}} className="scroll">
        {[['all','🗺️','All'],...Object.entries(trails).map(([k,t])=>[k,t.icon,t.name.replace(' Trail','')])].map(([k,ic,nm])=>{
          const on=trail===k;
          const col=k==='all'?C:trails[k]?.color||C;
          return (
            <button key={k} onClick={()=>{setTrail(k);setSel(null);}} style={{flexShrink:0,padding:'7px 14px',borderRadius:20,border:`1px solid ${on?col:BD}`,background:on?`${col}15`:S1,color:on?col:T2,fontSize:12,fontWeight:700,cursor:'pointer',transition:'all 0.2s'}}>
              {ic} {nm}
            </button>
          );
        })}
      </div>

      <div style={{flex:1,position:'relative',overflow:'hidden'}}>
        <div ref={mapDivRef} style={{width:'100%',height:'100%'}}/>
        {sel && (
          <div style={{position:'absolute',bottom:14,left:14,right:14,background:S1,borderRadius:22,padding:18,boxShadow:'0 12px 40px rgba(0,0,0,0.22)',animation:'fadeUp 0.25s cubic-bezier(0.22,1,0.36,1) both',zIndex:1000}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
              <div style={{flex:1}}>
                <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:4}}>
                  <span style={{fontSize:20}}>{sel.trail.icon}</span>
                  <span style={{fontSize:16,fontWeight:800,color:T1}}>{sel.name}</span>
                </div>
                <div style={{fontSize:13,color:T2,marginBottom:10}}>{sel.desc}</div>
                <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
                  {sel.visited
                    ? <><Pill bg='#E8F5E9' col='#2E7D32'>✓ Visited</Pill><Pill bg={GL} col='#9A7810'>+{sel.pts} pts earned</Pill></>
                    : <Pill bg='#FFF3E0' col='#BF360C'>🔒 Visit to unlock · +{sel.pts} pts</Pill>
                  }
                </div>
                {!sel.visited&&db&&(
                  <button onClick={()=>checkIn(sel)} disabled={checking} style={{marginTop:12,width:'100%',background:checking?'#E0A0A0':C,color:'#FFF',border:'none',borderRadius:24,padding:'12px',fontSize:13,fontWeight:800,cursor:checking?'default':'pointer',boxShadow:'0 4px 14px rgba(212,32,32,0.25)'}}>
                    {checking?'Checking in…':'📍 Check In Here'}
                  </button>
                )}
              </div>
              <button onClick={()=>setSel(null)} style={{background:BG,border:'none',width:28,height:28,borderRadius:'50%',cursor:'pointer',fontSize:13,color:T2,flexShrink:0,marginLeft:8}}>✕</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

  return (

      <div style={{background:S1,borderBottom:`1px solid ${BD}`,padding:'0 20px 14px'}}>
        <StatusBar/>
        <div style={{fontSize:22,fontWeight:900,color:T1,letterSpacing:-0.3}}>Challenges ⚡</div>
        <div style={{fontSize:13,color:T2,marginTop:2}}>Complete to earn points & badges</div>
      </div>

      <div style={{display:'flex',gap:8,padding:'10px 14px',overflowX:'auto',background:S1,borderBottom:`1px solid ${BD}`}} className="scroll">
        {[['all','⚡ All'],['food','🍽️ Food'],['farm','🌾 Farm'],['history','🏛️ History'],['arts','🎨 Arts']].map(([k,l])=>(
          <button key={k} onClick={()=>setFilter(k)} style={{flexShrink:0,padding:'7px 14px',borderRadius:20,border:`1px solid ${filter===k?C:BD}`,background:filter===k?`${C}12`:S1,color:filter===k?C:T2,fontSize:12,fontWeight:700,cursor:'pointer'}}>
            {l}
          </button>
        ))}
      </div>

      <div style={{margin:'14px 20px 0',background:S1,borderRadius:18,padding:'14px 16px',boxShadow:SH,display:'flex',gap:12,alignItems:'center',border:`1px solid ${C}18`}}>
        <div style={{width:40,height:40,borderRadius:12,background:`${C}15`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:22}}>⚡</div>
        <div>
          <div style={{fontSize:15,fontWeight:800,color:T1}}>{challenges.filter(c=>c.active).length} Active Challenges</div>
          <div style={{fontSize:12,color:T2}}>Earn up to {maxBonus} bonus pts this week</div>
        </div>
      </div>

      <div style={{padding:'12px 20px 100px',display:'flex',flexDirection:'column',gap:12}}>
        {shown.map(ch=>{
          const tc=trails[ch.type]?.color||C;
          const accepted=acceptedIds.has(ch.id);
          return (
            <div key={ch.id} style={{background:S1,borderRadius:20,padding:16,boxShadow:SH,opacity:ch.active?1:0.8,cursor:'pointer'}}>
              <div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
                <div style={{width:56,height:56,borderRadius:16,background:`${tc}15`,border:`1px solid ${tc}20`,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,flexShrink:0}}>{ch.icon}</div>
                <div style={{flex:1}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                    <div style={{fontSize:15,fontWeight:800,color:T1,lineHeight:1.25,maxWidth:200}}>{ch.title}</div>
                    {ch.active&&<span style={{background:`${C}15`,color:C,borderRadius:8,padding:'2px 7px',fontSize:10,fontWeight:800,flexShrink:0,marginLeft:6}}>LIVE</span>}
                  </div>
                  <div style={{fontSize:12,color:T2,marginTop:3}}>{ch.biz}</div>
                  <div style={{display:'flex',gap:7,marginTop:9,flexWrap:'wrap',alignItems:'center'}}>
                    <Pill bg={GL} col='#9A7810'>+{ch.pts} pts</Pill>
                    <span style={{fontSize:11,color:T3}}>⏰ {ch.expires}</span>
                    <span style={{fontSize:15}}>{ch.badge}</span>
                  </div>
                </div>
              </div>
              {ch.active&&(
                accepted
                  ? <div style={{width:'100%',marginTop:14,background:'#E8F5E9',color:'#2E7D32',borderRadius:30,padding:'13px',fontSize:14,fontWeight:800,textAlign:'center',letterSpacing:0.2}}>✓ Accepted — check in to complete</div>
                  : <button onClick={()=>accept(ch)} disabled={busyId===ch.id} style={{width:'100%',marginTop:14,background:busyId===ch.id?'#E0A0A0':C,color:'#FFF',border:'none',borderRadius:30,padding:'13px',fontSize:14,fontWeight:800,cursor:'pointer',boxShadow:`0 4px 16px rgba(212,32,32,0.28)`,letterSpacing:0.2}}>
                      {busyId===ch.id?'Accepting…':'Accept Challenge →'}
                    </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── Leaderboard ──────────────────────────────────────────────────────────────

  const [period,setPeriod]=useState('weekly');
  const [friends,setFriends]=useState(false);
  const data=lb[period]??[];
  const shown=friends?data.filter(u=>u.me||[1,4].includes(u.rank)):data;
  const medals={1:G,2:'#AAAAAA',3:'#C27A3A'};

  return (
    <div style={{height:'100%',overflowY:'auto',background:BG}} className="scroll">
      <div style={{background:S1,borderBottom:`1px solid ${BD}`,padding:'0 20px 16px'}}>
        <StatusBar/>
        <div style={{fontSize:22,fontWeight:900,color:T1,letterSpacing:-0.3}}>Leaderboard 🏆</div>
        <div style={{fontSize:13,color:T2,marginTop:2}}>Compete with your peers</div>
        <div style={{display:'flex',gap:4,marginTop:14,background:BG,borderRadius:12,padding:4}}>
          {[['weekly','Weekly'],['allTime','All Time']].map(([k,l])=>(
            <button key={k} onClick={()=>setPeriod(k)} style={{flex:1,padding:'9px 4px',border:'none',borderRadius:8,background:period===k?S1:'transparent',color:period===k?C:T2,fontSize:12,fontWeight:700,cursor:'pointer',transition:'all 0.2s',boxShadow:period===k?SH:undefined}}>
              {l}
            </button>
          ))}
        </div>
      </div>

      {!friends&&data.length>=3&&(
        <div style={{background:S1,padding:'22px 20px 12px',display:'flex',alignItems:'flex-end',justifyContent:'center',gap:10,borderBottom:`1px solid ${BD}`}}>
          <PodiumItem user={data[1]} rank={2} height={76}/>
          <PodiumItem user={data[0]} rank={1} height={104} crown/>
          <PodiumItem user={data[2]} rank={3} height={60}/>

      )}

      <div style={{padding:'10px 20px 6px',display:'flex',justifyContent:'flex-end'}}>
        <button onClick={()=>setFriends(!friends)} style={{background:friends?`${C}12`:S1,color:friends?C:T2,border:`1px solid ${friends?C:BD}`,borderRadius:20,padding:'6px 14px',fontSize:12,fontWeight:700,cursor:'pointer',boxShadow:SH}}>
          {friends?'👥 Friends Only':'👥 Friends'}
        </button>
      </div>

      <div style={{padding:'6px 20px 100px',display:'flex',flexDirection:'column',gap:8}}>
        {shown.map(u=>(
          <div key={`${period}-${u.name}`} style={{background:u.me?`${GL}`:S1,borderRadius:16,padding:'12px 14px',display:'flex',alignItems:'center',gap:12,boxShadow:SH,border:u.me?`1px solid ${G}30`:undefined}}>
            <div style={{width:32,height:32,borderRadius:'50%',background:medals[u.rank]||(u.me?`${GL}`:`${BG}`),display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:900,color:u.rank<=3?'#FFF':T2,flexShrink:0}}>{u.rank}</div>
            <div style={{width:38,height:38,borderRadius:'50%',background:BG,display:'flex',alignItems:'center',justifyContent:'center',fontSize:20,flexShrink:0}}>{u.av}</div>
            <div style={{flex:1}}>
              <div style={{fontSize:14,fontWeight:800,color:u.me?DC:T1}}>{u.name}{u.me?' (You)':''}</div>
              <div style={{fontSize:11,color:T2}}>{u.yr}</div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:15,fontWeight:900,color:u.me?DC:T1}}>{u.pts.toLocaleString()}</div>
              <div style={{fontSize:11,color:T3}}>{u.badges} badges</div>

function PodiumItem({user,rank,height,crown}) {
  const bg={1:G,2:'#BBBBBB',3:'#C27A3A'}[rank];
  return (
    <div style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center'}}>
      {crown&&<div style={{fontSize:16,marginBottom:2}}>👑</div>}
      <div style={{fontSize:rank===1?36:28,marginBottom:3}}>{user.av}</div>
      <div style={{fontSize:10,fontWeight:800,color:user.me?DC:T1,textAlign:'center',maxWidth:76,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{user.name}</div>
      <div style={{width:'100%',background:bg,borderRadius:'10px 10px 0 0',padding:`${rank===1?14:10}px 4px`,marginTop:6,textAlign:'center'}}>
        <div style={{fontSize:rank===1?22:17}}>{['🥇','🥈','🥉'][rank-1]}</div>
        <div style={{fontSize:10,fontWeight:900,color:'#FFF',marginTop:1}}>{user.pts.toLocaleString()}</div>
      </div>
    </div>
  );
}

// ─── Rewards ──────────────────────────────────────────────────────────────────
function RewardsTab() {
  const {me,rewards,history,refresh}=useData();
  const [tab,setTab]=useState('tiers');
  const [busyId,setBusyId]=useState(null);
  const pts=me.points;
  const cur=tierFor(pts);
  const nxt=TIERS[TIERS.indexOf(cur)+1];
  const pct=nxt?Math.round(((pts-cur.min)/(nxt.min-cur.min))*100):100;

  const redeem=async item=>{
    if(!db||busyId) return;
    if(!confirm(`Redeem ${item.name} for ${item.cost} points?`)) return;
    setBusyId(item.id);
    const {data,error}=await db.rpc('redeem_reward',{p_reward_id:item.id});
    setBusyId(null);
    if(error){ alert(error.message); return; }
    refresh();
    alert(`🎫 Redeemed! Show this code at ${item.partner}: ${data.code}`);
  };

  return (
    <div style={{height:'100%',overflowY:'auto',background:BG}} className="scroll">
      {/* Balance header — white surface */}
      <div style={{background:S1,borderBottom:`1px solid ${BD}`,padding:'0 20px 20px'}}>
        <StatusBar/>
        <div style={{fontSize:11,color:T3,fontWeight:700,textTransform:'uppercase',letterSpacing:1,marginBottom:6}}>Your Balance</div>
        <div style={{display:'flex',alignItems:'baseline',gap:8,marginBottom:8}}>
          <div style={{fontSize:54,fontWeight:900,color:T1,fontFamily:'Georgia,serif',letterSpacing:-2,lineHeight:1}}>{pts.toLocaleString()}</div>
          <div style={{fontSize:15,color:T3,fontWeight:500,paddingBottom:4}}>points</div>
        </div>
        <Pill bg={GL} col='#9A7810'>{cur.icon} {cur.tier} Tier</Pill>
        {nxt&&<div style={{marginTop:14}}>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:11,color:T3,marginBottom:6}}>
            <span>{cur?.tier}</span><span style={{color:T2,fontWeight:600}}>{(nxt.min-pts).toLocaleString()} pts to {nxt.tier}</span><span>{nxt.tier}</span>
          </div>
          <div style={{height:5,background:BG,borderRadius:3,overflow:'hidden'}}>
            <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${C},${G})`,borderRadius:3}}/>
          </div>
        </div>}
      </div>

      {/* Sub tabs */}
      <div style={{display:'flex',background:S1,borderBottom:`1px solid ${BD}`}}>
        {[['tiers','🏅 Tiers'],['redeem','🎫 Redeem'],['history','📋 History']].map(([k,l])=>(
          <button key={k} onClick={()=>setTab(k)} style={{flex:1,padding:'13px 8px',border:'none',borderBottom:tab===k?`2.5px solid ${C}`:'2.5px solid transparent',background:'transparent',color:tab===k?C:T3,fontSize:12,fontWeight:700,cursor:'pointer',transition:'color 0.2s'}}>
            {l}
          </button>
        ))}
      </div>

      {tab==='tiers'&&(
        <div style={{padding:'14px 20px 100px',display:'flex',flexDirection:'column',gap:10}}>
          {TIERS.map(t=>{
            const on=pts>=t.min, curr=t===cur;
            return (
              <div key={t.tier} style={{background:S1,borderRadius:18,border:curr?`1.5px solid ${t.col}40`:`1px solid ${BD}`,padding:16,boxShadow:SH,opacity:on?1:0.55}}>
                <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:10}}>
                  <div style={{width:44,height:44,borderRadius:'50%',background:on?`${t.col}18`:BG,display:'flex',alignItems:'center',justifyContent:'center',fontSize:24}}>{t.icon}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:15,fontWeight:800,color:curr?t.col:T1}}>{t.tier} {curr&&<span style={{fontSize:11,color:T3,fontWeight:500}}>← current</span>}</div>
                    <div style={{fontSize:11,color:T3}}>{t.max===Infinity?`${t.min.toLocaleString()}+ pts`:`${t.min.toLocaleString()} – ${t.max.toLocaleString()} pts`}</div>
                  </div>
                  {on&&<span>✅</span>}
                </div>
                <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
                  {t.rewards.map((r,i)=><span key={i} style={{background:on?`${t.col}12`:BG,color:on?T1:T3,borderRadius:8,padding:'4px 10px',fontSize:11}}>{r}</span>)}
                </div>
              </div>
            );
          })}
        </div>
      )}

      {tab==='redeem'&&(
        /* Airbnb listing-style rows */
        <div style={{padding:'14px 20px 100px',display:'flex',flexDirection:'column',gap:10}}>
          {rewards.map(item=>{
            const ok=pts>=item.cost;
            return (
              <div key={item.id} style={{background:S1,borderRadius:16,padding:14,display:'flex',gap:14,alignItems:'center',boxShadow:SH}}>
                <div style={{width:52,height:52,borderRadius:14,background:GL,display:'flex',alignItems:'center',justifyContent:'center',fontSize:26}}>{item.icon}</div>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:T1}}>{item.name}</div>
                  <div style={{fontSize:12,color:T2}}>{item.partner}</div>
                </div>
                <button onClick={()=>ok&&redeem(item)} disabled={!ok||busyId===item.id} style={{background:ok?(busyId===item.id?'#E0A0A0':C):'#EEE',color:ok?'#FFF':T3,border:'none',borderRadius:26,padding:'9px 14px',cursor:ok?'pointer':'default',fontSize:12,fontWeight:800,whiteSpace:'nowrap',boxShadow:ok?`0 3px 12px rgba(212,32,32,0.25)`:undefined}}>
                  {busyId===item.id?'…':`${item.cost} pts`}
                </button>
              </div>
            );
          })}
        </div>
      )}

      {tab==='history'&&(
        <div style={{padding:'14px 20px 100px',display:'flex',flexDirection:'column',gap:8}}>
          {history.length===0&&(
            <div style={{textAlign:'center',padding:'40px 20px',color:T3,fontSize:13}}>
              No activity yet — check in somewhere to start earning! 📍
            </div>
          )}
          {history.map(item=>(
            <div key={item.id} style={{background:S1,borderRadius:14,padding:'12px 14px',display:'flex',gap:12,alignItems:'center',boxShadow:SH}}>
              <div style={{fontSize:22}}>{item.icon}</div>
              <div style={{flex:1}}><div style={{fontSize:13,fontWeight:600,color:T1}}>{item.act}</div><div style={{fontSize:11,color:T2}}>{item.date}</div></div>
              <div style={{fontSize:15,fontWeight:900,color:item.pts>0?'#2E7D32':C}}>{item.pts>0?'+':''}{item.pts}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ─── Profile ──────────────────────────────────────────────────────────────────
function ProfileTab() {
  const {me,trails,badges,signOut}=useData();
  const cur=tierFor(me.points);
  const allLocs=Object.values(trails).flatMap(t=>t.locations);
  const visited=allLocs.filter(l=>l.visited).length;
  const earned=badges.filter(b=>b.earned).length;
  return (
    <div style={{height:'100%',overflowY:'auto',background:BG}} className="scroll">
      {/* Header */}
      <div style={{background:S1,borderBottom:`1px solid ${BD}`,padding:'0 20px 24px',textAlign:'center'}}>
        <StatusBar/>
        <div style={{width:80,height:80,borderRadius:'50%',background:BG,border:`2px solid ${BD}`,margin:'8px auto 12px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:40,boxShadow:SH}}>{me.avatar}</div>
        <div style={{fontSize:22,fontWeight:900,color:T1,letterSpacing:-0.3}}>{me.displayName}</div>
        <div style={{fontSize:13,color:T2,marginTop:2}}>@{me.username}</div>
        <div style={{display:'flex',justifyContent:'center',gap:8,marginTop:10}}>
          <Pill bg={BG} col={T2} border={BD}>🎓 {me.classification}</Pill>
          <Pill bg={GL} col='#9A7810'>{cur.icon} {cur.tier} Tier</Pill>
        </div>
      </div>

      {/* Stats */}
      <div style={{background:S1,padding:'16px 8px',display:'flex',justifyContent:'space-around',borderBottom:`1px solid ${BD}`}}>
        {[['⭐',me.points.toLocaleString(),'Points'],['🏅',String(earned),'Badges'],['📍',`${visited}/${allLocs.length}`,'Visited'],['🏆',me.weeklyRank?`#${me.weeklyRank}`:'—','Rank']].map(([ic,v,l])=>(
          <div key={l} style={{textAlign:'center'}}>
            <div style={{fontSize:18,marginBottom:3}}>{ic}</div>
            <div style={{fontSize:18,fontWeight:900,color:C}}>{v}</div>
            <div style={{fontSize:9,color:T3,fontWeight:700,textTransform:'uppercase',letterSpacing:0.4}}>{l}</div>
          </div>
        ))}
      </div>

      {/* Trail progress */}
      <div style={{padding:'20px 20px 0'}}>
        <div style={{fontSize:15,fontWeight:800,color:T1,marginBottom:14,letterSpacing:-0.2}}>Trail Progress</div>
        {Object.entries(trails).map(([k,t])=>{
          const v=t.locations.filter(l=>l.visited).length,tot=t.locations.length,p=Math.round((v/tot)*100);
          return (
            <div key={k} style={{marginBottom:14}}>
              <div style={{display:'flex',justifyContent:'space-between',fontSize:13,fontWeight:700,marginBottom:6}}>
                <span style={{color:T1}}>{t.icon} {t.name}</span>
                <span style={{color:p===100?'#2E7D32':T3}}>{v}/{tot}{p===100?' ✓':''}</span>
              </div>
              <div style={{height:5,background:BD,borderRadius:3,overflow:'hidden'}}>
                <div style={{height:'100%',borderRadius:3,background:p===100?'#2E7D32':t.color,width:`${p}%`,transition:'width 0.6s ease'}}/>
              </div>
            </div>
          );
        })}
      </div>

      {/* Badges */}
      <div style={{padding:'20px 20px 0'}}>
        <div style={{fontSize:15,fontWeight:800,color:T1,marginBottom:14,letterSpacing:-0.2}}>Badges 🏅</div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
          {badges.map((b,i)=>(
            <div key={i} style={{background:S1,borderRadius:14,padding:'12px 6px',textAlign:'center',boxShadow:b.earned?SH:undefined,border:`1px solid ${b.earned?G+'25':BD}`,opacity:b.earned?1:0.45}}>
              <div style={{fontSize:26,marginBottom:5,filter:b.earned?'none':'grayscale(1)'}}>{b.icon}</div>
              <div style={{fontSize:9,fontWeight:700,color:b.earned?T1:T3,lineHeight:1.2}}>{b.name}</div>
            </div>
          ))}
        </div>
      </div>

      {/* Settings */}
      <div style={{padding:'20px 20px 100px'}}>
        <div style={{fontSize:15,fontWeight:800,color:T1,marginBottom:14,letterSpacing:-0.2}}>Settings</div>
        <div style={{background:S1,borderRadius:18,overflow:'hidden',boxShadow:SH,border:`1px solid ${BD}`}}>
          {[
            {icon:'🔔',label:'Notifications',val:'On'},
            {icon:'✉️',label:'Email',val:me.email||'—'},
            {icon:'❓',label:'Help & Support'},
            {icon:'🚪',label:'Sign Out',danger:true,onClick:signOut},
          ].map((s,i,arr)=>(
            <div key={i} onClick={s.onClick} style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',borderBottom:i<arr.length-1?`1px solid ${BD}`:undefined}}>
              <span style={{fontSize:18}}>{s.icon}</span>
              <span style={{flex:1,fontSize:14,fontWeight:600,color:s.danger?C:T1}}>{s.label}</span>
              {s.val&&<span style={{fontSize:12,color:T3}}>{s.val}</span>}
              <span style={{color:BD,fontSize:16}}>›</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

// ─── Root ─────────────────────────────────────────────────────────────────────
function App() {
  const [screen,setScreen]=useState('splash');
  const [role,setRole]=useState(null);
  const [tab,setTab]=useState('home');
  const [session,setSession]=useState(null);
  const [live,setLive]=useState(null);
  const sessionRef=useRef(null);
  sessionRef.current=session;

  // Track the Supabase session
  useEffect(()=>{
    if(!db) return;
    db.auth.getSession().then(({data})=>setSession(data.session));
    const {data:sub}=db.auth.onAuthStateChange((_e,s)=>setSession(s));
    return ()=>sub.subscription.unsubscribe();
  },[]);

  // Load (or reload) live data whenever there's a session
  const refresh=()=>{
    if(db) fetchLive().then(setLive).catch(e=>console.warn('live fetch failed, using fallback:',e?.message??e));
  };
  useEffect(()=>{ if(session) refresh(); },[session]);

  const signOut=async()=>{
    if(db) await db.auth.signOut();
    setLive(null);
    setTab('home');
    setScreen('role');
  };

  // Fallback-merged view of the world for all tabs
  const data={
    live: live!=null,
    me: live?.me ?? ME_FALLBACK,
    trails: live?.trails ?? TRAILS,
    challenges: live?.challenges ?? CHALLENGES,
    acceptedIds: live?.acceptedIds ?? new Set(),
    badges: live?.badges ?? BADGES_DATA,
    rewards: live?.rewards ?? REWARDS_FALLBACK,
    history: live?.history ?? HISTORY_FALLBACK,
    lb: live?.lb ?? {weekly:LB.weekly, allTime:LB.allTime},
    refresh, signOut,
  };

  const renderMain=()=>({
    home:        <HomeTab/>,
    map:         <MapTab/>,
    challenges:  <ChallengesTab/>,
    leaderboard: <LeaderboardTab/>,
    rewards:     <RewardsTab/>,
    profile:     <ProfileTab/>,
  }[tab]||<HomeTab/>);

  return (
    <DataCtx.Provider value={data}>
      <div className="screen">
        {screen==='splash' && <Splash onDone={()=>setScreen(sessionRef.current?'main':'role')}/>}
        {screen==='role'   && <RoleSelect onPick={r=>{setRole(r);setScreen('login');}}/>}
        {screen==='login'  && <Login role={role} onLogin={()=>setScreen('main')}/>}
        {screen==='main'   && (
          <div style={{width:'100%',height:'100%',position:'relative',background:BG}}>
            <div style={{height:'calc(100% - 70px - env(safe-area-inset-bottom))',overflow:'hidden'}}>{renderMain()}</div>
            <TabBar active={tab} onChange={setTab}/>
          </div>
        )}
      </div>
    </DataCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
